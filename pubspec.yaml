name: league_hub
description: "League Hub - Manage your sports leagues, hubs, and teams."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  connectivity_plus: ^6.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  dio: ^5.4.1
  cupertino_icons: ^1.0.6
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  fake_cloud_firestore: ^3.0.0
  firebase_auth_mocks: ^0.14.0
  firebase_storage_mocks: ^0.7.0

flutter:
  uses-material-design: true
