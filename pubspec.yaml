name: league_hub
description: "League Hub - Manage your sports leagues, hubs, and teams."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
